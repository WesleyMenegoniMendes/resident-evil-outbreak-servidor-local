name: Build Release

on:
  push:
    tags:
      - "v*"            # dispara em qualquer tag tipo v1.0, v1.1, etc.
  workflow_dispatch:    # também pode disparar manualmente no GitHub

jobs:

  # -----------------------------------------------------------------------
  # Linux: gera executável + empacota com Dockerfile/config num .zip
  # -----------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install pyinstaller pillow
          sudo apt-get install -y python3-tk

      - name: Converter PNG para ICO
        run: |
          python3 -c "
          from PIL import Image
          img = Image.open('resident_evil_outbreak_file__1_icon_by_christian_7_d8r1e26-375w-2x.png')
          img.save('outbreak-icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: Build Linux
        run: |
          pyinstaller --onefile --windowed \
            --name "Servidor-RE-Outbreak-Linux" \
            outbreak-server-setup.py

      - name: Empacotar .zip (executável + Dockerfile + config + atalho)
        run: |
          mkdir -p pacote/Servidor-RE-Outbreak
          cp dist/Servidor-RE-Outbreak-Linux pacote/Servidor-RE-Outbreak/
          chmod +x pacote/Servidor-RE-Outbreak/Servidor-RE-Outbreak-Linux
          cp -r config pacote/Servidor-RE-Outbreak/
          cp Dockerfile pacote/Servidor-RE-Outbreak/
          cp outbreak-icon.ico pacote/Servidor-RE-Outbreak/

          # script wrapper: garante permissão de execução antes de abrir
          cat > pacote/Servidor-RE-Outbreak/abrir-servidor.sh << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          chmod +x "$DIR/Servidor-RE-Outbreak-Linux"
          "$DIR/Servidor-RE-Outbreak-Linux"
          SCRIPT
          chmod +x pacote/Servidor-RE-Outbreak/abrir-servidor.sh

          # atalho .desktop clicável (duplo clique funciona na maioria dos gerenciadores)
          cat > "pacote/Servidor-RE-Outbreak/Abrir Servidor.desktop" << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Servidor Resident Evil Outbreak
          Comment=Abre o painel do servidor local do RE Outbreak
          Exec=bash -c 'cd "$(dirname "%k" | sed "s|^file://||")" && ./abrir-servidor.sh'
          Icon=outbreak-icon.ico
          Terminal=false
          Categories=Game;
          DESKTOP
          chmod +x "pacote/Servidor-RE-Outbreak/Abrir Servidor.desktop"

          cat > "pacote/Servidor-RE-Outbreak/LEIA-ME.txt" << 'TXT'
          COMO ABRIR O SERVIDOR (LINUX)

          Opcao 1 (mais facil): clique com o botao direito em "Abrir Servidor.desktop"
          e escolha "Executar" ou "Permitir Executar" se for perguntado, depois de
          duplo clique nele.

          Opcao 2: abra um terminal nesta pasta e rode:
             ./abrir-servidor.sh

          Se aparecer um aviso de "arquivo nao confiavel" ao abrir o .desktop,
          isso e normal (e so um aviso de seguranca do sistema) - clique em
          "Confiar e Executar" ou similar.
          TXT

          cd pacote && zip -r ../Servidor-RE-Outbreak-Linux.zip Servidor-RE-Outbreak

      - name: Upload artefato Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Servidor-RE-Outbreak-Linux.zip

  # -----------------------------------------------------------------------
  # Windows: gera .exe + empacota com Dockerfile/config num .zip
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pyinstaller pillow

      - name: Converter PNG para ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('resident_evil_outbreak_file__1_icon_by_christian_7_d8r1e26-375w-2x.png')
          img.save('outbreak-icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: Build Windows
        run: |
          pyinstaller --onefile --windowed `
            --name "Servidor-RE-Outbreak" `
            --icon "outbreak-icon.ico" `
            outbreak-server-setup.py

      - name: Empacotar .zip (executável + Dockerfile + config)
        run: |
          mkdir pacote
          mkdir pacote\Servidor-RE-Outbreak
          copy dist\Servidor-RE-Outbreak.exe pacote\Servidor-RE-Outbreak\
          xcopy /E /I config pacote\Servidor-RE-Outbreak\config
          copy Dockerfile pacote\Servidor-RE-Outbreak\
          copy outbreak-icon.ico pacote\Servidor-RE-Outbreak\
          Compress-Archive -Path pacote\Servidor-RE-Outbreak -DestinationPath Servidor-RE-Outbreak-Windows.zip

      - name: Upload artefato Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Servidor-RE-Outbreak-Windows.zip

  # -----------------------------------------------------------------------
  # Publicar na Release do GitHub com os dois .zip
  # -----------------------------------------------------------------------
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artefatos
        uses: actions/download-artifact@v4

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Servidor RE Outbreak ${{ github.ref_name }}"
          body: |
            # 🧟 Servidor Privado — Resident Evil Outbreak File #1 e #2

            Crie seu próprio servidor pra jogar Resident Evil Outbreak online com amigos — **sem depender do servidor oficial (obsrv.org), que fica nos EUA e causa lag, queda de conexão e zumbi "teleportando"**.

            Feito pra qualquer pessoa conseguir criar o servidor com poucos cliques, **mesmo sem entender nada de programação ou servidores**.

            ---

            ## 📥 Download

            | Sistema | Link |
            |---------|------|
            | 🪟 **Windows** | [Servidor-RE-Outbreak-Windows.zip](../../releases/download/${{ github.ref_name }}/Servidor-RE-Outbreak-Windows.zip) |
            | 🐧 **Linux** | [Servidor-RE-Outbreak-Linux.zip](../../releases/download/${{ github.ref_name }}/Servidor-RE-Outbreak-Linux.zip) |

            ---

            ## 🚀 Passo a passo (poucos cliques, sem precisar entender nada)

            ### 1. Baixe e extraia
            Baixe o `.zip` do seu sistema (link acima) e **extraia a pasta inteira** em qualquer lugar do seu PC (ex: Área de Trabalho).

            ### 2. Abra o programa
            - **Windows:** dê duplo clique em `Servidor-RE-Outbreak.exe`
            - **Linux:** dê duplo clique em **"Abrir Servidor.desktop"** (se pedir confirmação de "executar", confirme) — ou abra um terminal na pasta e rode `./abrir-servidor.sh`. Veja `LEIA-ME.txt` se tiver dúvida.

            ### 3. Primeira vez só (3 cliques)
            1. Clique em **"📦 Instalar Podman/Docker"** (se o botão aparecer ativo — o app detecta se você já tem instalado)
            2. Clique em **"🔨 Construir Imagem"** e espere (~15 minutos, só acontece uma vez — vá tomar um café)
            3. Clique em **"🔍 Detectar"** ao lado do campo de IP e escolha a opção que aparecer (Hamachi, rede local, etc.)

            ### 4. Jogar
            - Clique em **"▶ LIGAR SERVIDOR"** antes de chamar seus amigos
            - Clique em **"■ DESLIGAR"** quando terminar (não fica consumindo memória/CPU do PC à toa)

            O app cuida sozinho de:
            - ✅ Detectar e instalar o que falta (Podman no Linux / Docker Desktop no Windows)
            - ✅ Corrigir configurações do sistema operacional que bloqueiam o servidor (AppArmor em Fedora/Ubuntu/Debian)
            - ✅ Criar e gerenciar o container do servidor
            - ✅ Abrir as portas certas automaticamente

            ---

            ## 🔑 Como funciona o login (automático, sem cadastro)

            Diferente do servidor oficial, aqui **não existe tela de cadastro separada**. Quando você ou seus amigos forem entrar no jogo:

            1. Na tela de login do jogo, digite **qualquer nome** no campo ID
            2. Clique em LOGIN
            3. Pronto — a conta é **criada na hora automaticamente**, com aquele nome já aparecendo certinho pros outros jogadores verem na sala

            Da próxima vez, é só digitar o mesmo nome de novo pra continuar na mesma conta. Não precisa de senha, nem de site externo, nem de e-mail.

            ---

            ## ⚠️ Importante: isso é pra jogar com amigos, não pra servidor público

            Esse sistema de login automático **não tem segurança de verdade** — qualquer pessoa que souber o IP do seu servidor consegue criar uma conta com qualquer nome, sem senha. Isso é **proposital**, pra facilitar jogar com amigos numa rede privada (Hamachi, rede local, etc.).

            **Não é seguro deixar esse servidor exposto pra internet pública sem mudanças.** Se você quiser fazer um servidor público de verdade, vai precisar editar os arquivos `config/autologin.php` e `config/login_form.php` pra adicionar autenticação de verdade (senha obrigatória, validação, etc.).

            ---

            ## 📌 O que você ainda precisa fazer manualmente

            O app automatiza **tudo da parte do servidor**, mas algumas coisas continuam manuais porque estão fora do nosso controle:

            - Instalar e configurar uma VPN (Hamachi ou similar) pra você e seus amigos ficarem na mesma rede — **ou** abrir as portas do servidor no seu roteador, se preferir IP público
            - Configurar o **DNS1 e DNS2** no PCSX2 (Config → Rede) e dentro do próprio jogo, apontando pro IP do servidor — cada jogador faz isso uma vez só
            - Ter a **ISO japonesa (NTSC-J)** do jogo — isso não fornecemos, é por conta de cada um

            *(Tutorial detalhado dessas partes deve ser publicado separadamente.)*

            ---

            ## 🛠 Para quem quiser mexer no código

            ```bash
            git clone https://github.com/WesleyMenegoniMendes/resident-evil-outbreak-servidor-local.git
            cd resident-evil-outbreak-servidor-local
            python3 outbreak-server-setup.py   # Linux
            python outbreak-server-setup.py    # Windows
            ```

            ---

            ## Créditos

            Criado por **Wesley Menegoni**.
            Servidor baseado em [bioserver-docker](https://github.com/corbin-zip/bioserver-docker) e protocolo do [obsrv.org](https://obsrv.org) — fã-server da comunidade desde 2013.
          files: |
            windows-build/Servidor-RE-Outbreak-Windows.zip
            linux-build/Servidor-RE-Outbreak-Linux.zip
