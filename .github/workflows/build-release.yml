name: Build Release

on:
  push:
    tags:
      - "v*"            # dispara em qualquer tag tipo v1.0, v1.1, etc.
  workflow_dispatch:    # também pode disparar manualmente no GitHub

jobs:

  # -----------------------------------------------------------------------
  # Linux: gera executável + empacota com Dockerfile/config num .zip
  # -----------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install pyinstaller pillow
          sudo apt-get install -y python3-tk

      - name: Converter PNG para ICO
        run: |
          python3 -c "
          from PIL import Image
          img = Image.open('resident_evil_outbreak_file__1_icon_by_christian_7_d8r1e26-375w-2x.png')
          img.save('outbreak-icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: Build Linux
        run: |
          pyinstaller --onefile --windowed \
            --name "Servidor-RE-Outbreak-Linux" \
            outbreak-server-setup.py

      - name: Empacotar .zip (executável + Dockerfile + config)
        run: |
          mkdir -p pacote/Servidor-RE-Outbreak
          cp dist/Servidor-RE-Outbreak-Linux pacote/Servidor-RE-Outbreak/
          chmod +x pacote/Servidor-RE-Outbreak/Servidor-RE-Outbreak-Linux
          cp -r config pacote/Servidor-RE-Outbreak/
          cp Dockerfile pacote/Servidor-RE-Outbreak/
          cp outbreak-icon.ico pacote/Servidor-RE-Outbreak/
          cd pacote && zip -r ../Servidor-RE-Outbreak-Linux.zip Servidor-RE-Outbreak

      - name: Upload artefato Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Servidor-RE-Outbreak-Linux.zip

  # -----------------------------------------------------------------------
  # Windows: gera .exe + empacota com Dockerfile/config num .zip
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pyinstaller pillow

      - name: Converter PNG para ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('resident_evil_outbreak_file__1_icon_by_christian_7_d8r1e26-375w-2x.png')
          img.save('outbreak-icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: Build Windows
        run: |
          pyinstaller --onefile --windowed `
            --name "Servidor-RE-Outbreak" `
            --icon "outbreak-icon.ico" `
            outbreak-server-setup.py

      - name: Empacotar .zip (executável + Dockerfile + config)
        run: |
          mkdir pacote
          mkdir pacote\Servidor-RE-Outbreak
          copy dist\Servidor-RE-Outbreak.exe pacote\Servidor-RE-Outbreak\
          xcopy /E /I config pacote\Servidor-RE-Outbreak\config
          copy Dockerfile pacote\Servidor-RE-Outbreak\
          copy outbreak-icon.ico pacote\Servidor-RE-Outbreak\
          Compress-Archive -Path pacote\Servidor-RE-Outbreak -DestinationPath Servidor-RE-Outbreak-Windows.zip

      - name: Upload artefato Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Servidor-RE-Outbreak-Windows.zip

  # -----------------------------------------------------------------------
  # Publicar na Release do GitHub com os dois .zip
  # -----------------------------------------------------------------------
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artefatos
        uses: actions/download-artifact@v4

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Servidor RE Outbreak ${{ github.ref_name }}"
          body: |
            ## 📥 Download Direto (clique e baixe, sem precisar de Git)

            | Sistema | Link |
            |---------|------|
            | 🪟 **Windows** | [Servidor-RE-Outbreak-Windows.zip](../../releases/download/${{ github.ref_name }}/Servidor-RE-Outbreak-Windows.zip) |
            | 🐧 **Linux** | [Servidor-RE-Outbreak-Linux.zip](../../releases/download/${{ github.ref_name }}/Servidor-RE-Outbreak-Linux.zip) |

            ---

            ## Servidor Privado — Resident Evil Outbreak File #1 e #2

            **Foco do projeto:** jogar com seus amigos em um servidor próprio, sem depender do servidor oficial (obsrv.org) que fica nos EUA. Com o servidor local, o ping é o ping direto entre você e seus amigos — sem zumbi teleportando, sem queda de conexão.

            ---

            ### Sistema de conta automático

            O login do jogo funciona de forma totalmente automática — **não precisa de cadastro externo nem de senha**.

            Como funciona:
            - Na tela de login do jogo, você digita qualquer nome no campo ID e clica em LOGIN
            - O servidor detecta o nome digitado e **cria a conta automaticamente** se ela não existir
            - O nickname que aparece para os outros jogadores (tela "SELECT ID") já é configurado automaticamente igual ao nome digitado
            - Da próxima vez que a pessoa digitar o mesmo nome, ela entra na mesma conta

            Isso foi necessário porque o navegador embutido do PCSX2 tem um bug: ao tentar enviar o formulário de login, ele faz uma requisição diferente do esperado. O servidor foi adaptado para interceptar esse comportamento e fazer o login/cadastro automaticamente.

            ---

            ### ⚠️ Aviso de segurança — servidor público

            Este projeto foi desenvolvido **exclusivamente para uso privado entre amigos**.

            O sistema de login automático **não tem autenticação real** — qualquer pessoa que saiba o IP do servidor consegue criar uma conta com qualquer nome, sem senha. Isso é intencional para facilitar o uso entre amigos em uma VPN privada (Hamachi, etc.), mas **não é seguro para um servidor público aberto na internet**.

            Se quiser hospedar um servidor público, será necessário modificar o sistema de login no arquivo `config/autologin.php` e `config/login_form.php` para exigir senha real antes de criar ou acessar uma conta.

            ---

            ### Instalação

            **Windows:**
            1. Baixe e extraia `Servidor-RE-Outbreak-Windows.zip`
            2. Execute `Servidor-RE-Outbreak.exe` (pode pedir pra instalar Docker Desktop — aceite)
            3. Clique em "Construir Imagem" (só na primeira vez, ~15 min)
            4. Configure o IP e clique em "Ligar Servidor" antes de jogar

            **Linux:**
            1. Baixe e extraia `Servidor-RE-Outbreak-Linux.zip`
            2. `chmod +x Servidor-RE-Outbreak-Linux && ./Servidor-RE-Outbreak-Linux`
            3. Mesmo processo acima

            ### Como os jogadores conectam
            - Configurar **DNS1 e DNS2 = IP do servidor** no PCSX2 e na tela de rede do jogo
            - ISO precisa ser a **japonesa (NTSC-J)**

            ---

            Baseado em [bioserver-docker](https://github.com/corbin-zip/bioserver-docker) e [obsrv.org](https://obsrv.org) — servidor feito por fãs para fãs desde 2013.
          files: |
            windows-build/Servidor-RE-Outbreak-Windows.zip
            linux-build/Servidor-RE-Outbreak-Linux.zip
